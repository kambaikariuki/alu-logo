<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Logo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <nav class="navbar">
      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="register.html">Upload a logo</a>
        <a href="verify.html">Verify logo</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
    </nav>

    <div class="nav-overlay" id="navOverlay"></div>

    <main class="container">
      <h1>ALU Logo Registration</h1>

      <!-- Wallet -->

      <section class="card">
        <h2>Wallet</h2>

        <button id="connect" class="primary-btn">Connect Wallet</button>

        <p>
          Address:
          <span id="address"> Not connected </span>
        </p>
      </section>

      <!-- Upload -->

      <section class="card">
        <h2>Upload Logo</h2>

        <div class="form-group">
          <input type="file" id="logoInput" accept="image/*" />
        </div>

        <div class="preview-container">
          <img id="preview" class="image-preview" alt="Logo preview" />
        </div>

        <button id="generateHash" class="primary-btn" disabled>
          Generate Hash
        </button>

        <h3>SHA-256 Hash</h3>

        <p id="hash" class="hash-box">No hash generated</p>
      </section>

      <!-- Metadata -->

      <section id="registrationSection" class="card">
        <h2>Asset Information</h2>

        <div class="form-group">
          <label> Asset Name </label>

          <input id="assetName" placeholder="ALU Official Logo 2026" />
        </div>

        <div class="form-group">
          <label> File Type </label>

          <input id="fileType" placeholder="PNG" />
        </div>

        <button id="registerAsset" class="primary-btn" disabled>
          Register Asset
        </button>

        <p id="message"></p>
      </section>
    </main>
    <script src="./js/nav.js"></script>

    <script type="module" src="js/register.js"></script>
  </body>
</html>
