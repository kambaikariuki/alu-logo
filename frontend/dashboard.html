<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Token Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <nav class="navbar">
      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="register.html">Upload a logo</a>
        <a href="verify.html">Verify logo</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
    </nav>

    <div class="nav-overlay" id="navOverlay"></div>

    <main class="container">
      <header>
        <h1>ALU Token Dashboard</h1>
      </header>

      <!-- Wallet -->

      <section class="card">
        <h2>Wallet</h2>

        <button id="connect" class="primary-btn">Connect Wallet</button>

        <p>
          Address:
          <span id="address"> Not connected </span>
        </p>
      </section>

      <!-- Token Overview -->

      <section id="ownershipOverviewSection" class="card" style="display: none">
        <h2>Ownership Overview</h2>

        <p>
          Total Supply:
          <span id="totalSupply"> - </span>
          ALU
        </p>

        <p>
          Your Balance:
          <span id="balance"> - </span>
          ALU
        </p>

        <p>
          Your Ownership:
          <span id="ownership"> - </span>
          %
        </p>
      </section>

      <!-- Holders -->

      <section id="tokenHoldersSection" class="card" style="display: none">
        <h2>Token Holders</h2>

        <table class="holders-table">
          <thead>
            <tr>
              <th>Wallet</th>

              <th>Ownership</th>
            </tr>
          </thead>

          <tbody id="holders">
            <!-- JavaScript inserts rows here -->
          </tbody>
        </table>
      </section>

      <!-- Distribution -->

      <section id="distributionSection" class="card" style="display: none">
        <h2>Distribute ALU Token Shares</h2>

        <p>Only the contract owner can access this section.</p>

        <div class="form-group">
          <label> Recipient Address </label>

          <input id="recipient" placeholder="0x..." />
        </div>

        <div class="form-group">
          <label> Amount </label>

          <input id="amount" type="number" placeholder="Amount of ALUT" />
        </div>

        <button id="distribute" class="primary-btn">Send Tokens</button>
      </section>

      <!-- Messages -->

      <section id="messageSection" class="card" style="display: none">
        <p id="message">-</p>
      </section>
    </main>
    <script src="./js/nav.js"></script>

    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
