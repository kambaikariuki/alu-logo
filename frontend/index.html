<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo dApp</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <nav class="navbar">
      <button
        class="nav-toggle"
        id="navToggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="register.html">Upload a logo</a>
        <a href="verify.html">Verify logo</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
    </nav>

    <div class="nav-overlay" id="navOverlay"></div>

    <main class="container">
      <h1>ALU Logo Registry</h1>

      <section class="card">
        <button id="connect" class="primary-btn">Connect Wallet</button>

        <div class="info">
          <p>
            Wallet:
            <span id="address">Not connected</span>
          </p>

          <p>
            Network:
            <span id="network">Unknown</span>
          </p>

          <p>
            ALUT Balance:
            <span id="balance">0</span>
          </p>
        </div>
      </section>

      <section class="card">
        <h2>Asset Registry</h2>

        <p>
          Asset Name:
          <span id="assetName"></span>
        </p>

        <p>
          Type:
          <span id="assetType"></span>
        </p>

        <p>
          Owner Address:
          <span id="assetOwner"></span>
        </p>
      </section>
    </main>
    <script src="./js/nav.js"></script>

    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
